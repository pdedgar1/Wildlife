<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tropical Wildlife Database</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f4f6f4;color:#1a1a1a;min-height:100vh}
.site-header{background:#fff;border-bottom:1px solid #dde5dd;position:sticky;top:0;z-index:100;padding:1rem 1.5rem 0.75rem}
.header-top{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem}
h1{font-size:1.25rem;font-weight:600;color:#1a3d1a;letter-spacing:-0.01em;flex-shrink:0}
.subtitle{font-size:0.78rem;color:#6b7c6b;margin-top:2px}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:380px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#6b7c6b;pointer-events:none}
#search{width:100%;padding:.45rem .75rem .45rem 2rem;border:1px solid #dde5dd;border-radius:8px;font-size:.875rem;background:#f8faf8;outline:none;transition:border-color .15s}
#search:focus{border-color:#2d7a2d;background:#fff}
.view-toggle{display:flex;gap:4px;background:#f0f4f0;border-radius:8px;padding:3px;margin-left:auto;flex-shrink:0}
.vbtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border:none;border-radius:6px;background:transparent;cursor:pointer;font-size:.78rem;font-weight:500;color:#6b7c6b;transition:all .15s;white-space:nowrap}
.vbtn:hover{color:#2d5a2d}
.vbtn.active{background:#fff;color:#1a3d1a;box-shadow:0 1px 3px rgba(0,60,0,.12)}
.filters{display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
.filter-sep{width:1px;height:20px;background:#dde5dd;margin:0 .2rem;align-self:center}
.chip{padding:.22rem .6rem;border-radius:20px;font-size:.73rem;font-weight:500;border:1px solid #dde5dd;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;color:#3d4d3d}
.chip:hover{border-color:#2d7a2d;color:#2d7a2d}
.chip.active{color:#fff;border-color:transparent}
.chip.time-day.active{background:#b35c00}.chip.time-night.active{background:#1a3d7a}
.chip.hab-forest.active{background:#1a5c1a}.chip.hab-station.active{background:#2d5c8a}
.chip.hab-coastal.active{background:#0a6b5a}.chip.hab-urban.active{background:#7a3d1a}
.chip.tax-vertebrate.active{background:#4d1a7a}.chip.tax-lepidoptera.active{background:#7a5500}
.chip.tax-arachnid.active{background:#7a1a1a}.chip.tax-invertebrate.active{background:#3d3d3d}
.count-bar{font-size:.73rem;color:#6b7c6b;padding:.35rem 0;border-top:1px solid #f0f0f0;margin-top:.5rem}
#count em{font-style:normal;font-weight:600;color:#1a3d1a}
main{padding:1.25rem 1.5rem 3rem}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:#fff;border:1px solid #dde5dd;border-radius:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s;display:flex;flex-direction:column;overflow:hidden}
.card:hover{box-shadow:0 4px 16px rgba(0,60,0,.09);border-color:#2d7a2d}
.card-media{width:100%;height:130px;overflow:hidden;background:#f0f4f0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-media img{width:100%;height:100%;object-fit:cover;display:block}
.card-media svg{width:100%;height:100%}
.card-body{padding:.85rem;display:flex;flex-direction:column;gap:.4rem;flex:1}
.card-filename{font-family:monospace;font-size:.68rem;color:#6b7c6b;letter-spacing:.02em}
.card-species{font-size:.875rem;font-weight:600;color:#1a2e1a;line-height:1.3}
.card-alt{font-size:.76rem;color:#4d5d4d;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:auto;padding-top:.35rem}
.tag{font-size:.66rem;font-weight:500;padding:.16rem .45rem;border-radius:10px}
.tag-day{background:#fef3e0;color:#7a3d00}.tag-night{background:#e8eef8;color:#1a3d7a}
.tag-forest{background:#e5f2e5;color:#1a4d1a}.tag-station{background:#e5eef8;color:#1a3d6a}
.tag-coastal{background:#e0f5f0;color:#0a4d3d}.tag-urban{background:#fdf0e8;color:#6a2a00}
.tag-vertebrate{background:#f0ebfc;color:#3d0a7a}.tag-lepidoptera{background:#fdf5e0;color:#5c3d00}
.tag-arachnid{background:#fce8e8;color:#7a0a0a}.tag-invertebrate{background:#f2f2f0;color:#3d3d3d}
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:#6b7c6b;font-size:.9rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,20,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:14px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(8px);transition:transform .18s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-media{width:100%;height:240px;overflow:hidden;background:#f0f4f0;display:flex;align-items:center;justify-content:center;border-radius:14px 14px 0 0;position:relative}
.modal-media img{width:100%;height:100%;object-fit:cover;display:block}
.modal-media svg{width:100%;height:240px}
.modal-swap{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.12);border-radius:6px;padding:4px 9px;font-size:.72rem;font-weight:500;cursor:pointer;color:#2a3a2a}
.modal-swap:hover{background:#fff}
.modal-header{padding:1.1rem 1.25rem .6rem;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.modal-title{font-size:1rem;font-weight:600;color:#1a2e1a;line-height:1.3}
.modal-file{font-family:monospace;font-size:.7rem;color:#6b7c6b;margin-top:2px}
.modal-close{background:none;border:none;cursor:pointer;color:#6b7c6b;padding:4px;border-radius:6px;font-size:1.2rem;line-height:1}
.modal-close:hover{background:#f0f0f0;color:#1a1a1a}
.modal-body{padding:1.1rem 1.25rem 1.5rem}
.modal-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1rem}
.field{margin-bottom:.9rem}
.field:last-child{margin-bottom:0}
.field-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#6b7c6b;margin-bottom:.25rem}
.field-value{font-size:.85rem;color:#2d3d2d;line-height:1.6}
.field-value.alt{font-style:italic;color:#4d5d4d;background:#f8faf8;padding:.55rem .75rem;border-radius:6px;border-left:3px solid #2d7a2d}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-top">
    <div><h1>Tropical Wildlife</h1><p class="subtitle">Interdisciplinary Teaching Workshop &middot; Field Photography</p></div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="search" placeholder="Search species, features, observations&hellip;" autocomplete="off">
    </div>
    <div class="view-toggle">
      <button class="vbtn" id="btn-photo" onclick="setView('photo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>Photo
      </button>
      <button class="vbtn" id="btn-illus" onclick="setView('illustration')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Illustration
      </button>
    </div>
  </div>
  <div class="filters">
    <div style="display:flex;gap:.3rem;flex-wrap:wrap">
      <button class="chip time-day" data-filter="time:day">Daytime</button>
      <button class="chip time-night" data-filter="time:night">Nighttime</button>
    </div>
    <div class="filter-sep"></div>
    <div style="display:flex;gap:.3rem;flex-wrap:wrap">
      <button class="chip hab-forest" data-filter="hab:forest">Forest</button>
      <button class="chip hab-station" data-filter="hab:station">Station</button>
      <button class="chip hab-coastal" data-filter="hab:coastal">Coastal</button>
      <button class="chip hab-urban" data-filter="hab:urban">Urban edge</button>
    </div>
    <div class="filter-sep"></div>
    <div style="display:flex;gap:.3rem;flex-wrap:wrap">
      <button class="chip tax-vertebrate" data-filter="tax:vertebrate">Vertebrate</button>
      <button class="chip tax-lepidoptera" data-filter="tax:lepidoptera">Lepidoptera</button>
      <button class="chip tax-arachnid" data-filter="tax:arachnid">Arachnid</button>
      <button class="chip tax-invertebrate" data-filter="tax:invertebrate">Invertebrate</button>
    </div>
  </div>
  <div class="count-bar"><span id="count">Loading&hellip;</span></div>
</header>
<main><div id="grid"></div></main>
<div class="modal-overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-media" id="modal-media">
      <button class="modal-swap" id="modal-swap" onclick="swapModal()"></button>
    </div>
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title-el"></div>
        <div class="modal-file" id="modal-file"></div>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

 environment", "observations": "Free-ranging pig at tourist beach — striking human-wildlife interface", "time": "day", "habitat": "coastal", "taxon": "vertebrate", "svg": "<svg viewBox=\"0 0 120 90\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"120\" height=\"90\" rx=\"6\" fill=\"#eedfc8\"/><rect x=\"0\" y=\"62\" width=\"120\" height=\"28\" fill=\"#e8d898\"/><path d=\"M0,62 Q60,58 120,62\" fill=\"#d8c888\"/><rect x=\"4\" y=\"50\" width=\"32\" height=\"8\" rx=\"2\" fill=\"#c09850\" transform=\"rotate(-5,4,50)\"/><rect x=\"2\" y=\"55\" width=\"4\" height=\"10\" fill=\"#a07840\"/><rect x=\"32\" y=\"54\" width=\"4\" height=\"10\" fill=\"#a07840\"/><line x1=\"110\" y1=\"90\" x2=\"108\" y2=\"20\" stroke=\"#7a5820\" stroke-width=\"4\" stroke-linecap=\"round\"/><path d=\"M108,20 Q90,14 78,22\" stroke=\"#2a7820\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"/><path d=\"M108,20 Q120,10 118,26\" stroke=\"#2a7820\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"/><ellipse cx=\"60\" cy=\"60\" rx=\"24\" ry=\"16\" fill=\"#e8a0b0\"/><circle cx=\"82\" cy=\"55\" r=\"13\" fill=\"#e8a0b0\"/><circle cx=\"89\" cy=\"57\" r=\"6\" fill=\"#d88090\"/><circle cx=\"87\" cy=\"56\" r=\"1.5\" fill=\"#8a3040\"/><circle cx=\"91\" cy=\"56\" r=\"1.5\" fill=\"#8a3040\"/><circle cx=\"84\" cy=\"49\" r=\"2.5\" fill=\"#1a1a1a\"/><path d=\"M78,44 Q72,36 76,46\" fill=\"#d890a0\"/><rect x=\"46\" y=\"73\" width=\"6\" height=\"12\" rx=\"3\" fill=\"#d890a0\"/><rect x=\"56\" y=\"74\" width=\"6\" height=\"12\" rx=\"3\" fill=\"#d890a0\"/><rect x=\"66\" y=\"73\" width=\"6\" height=\"12\" rx=\"3\" fill=\"#d890a0\"/><rect x=\"76\" y=\"73\" width=\"6\" height=\"12\" rx=\"3\" fill=\"#d890a0\"/><path d=\"M36,58 Q28,52 30,60 Q32,68 40,64\" stroke=\"#d890a0\" stroke-width=\"2.5\" fill=\"none\"/></svg>"}];
const tagLabel={day:"Daytime",night:"Nighttime",forest:"Forest",station:"Station",coastal:"Coastal",urban:"Urban edge",vertebrate:"Vertebrate",lepidoptera:"Lepidoptera",arachnid:"Arachnid",invertebrate:"Invertebrate"};
let viewMode=localStorage.getItem("wdb-view")||"photo";
let modalMode=viewMode;
let cur=null;
let activeFilters=new Set();

function setView(v){
  viewMode=v;
  localStorage.setItem("wdb-view",v);
  document.getElementById("btn-photo").classList.toggle("active",v==="photo");
  document.getElementById("btn-illus").classList.toggle("active",v==="illustration");
  render();
}

function makeTags(r){
  return [r.time,r.habitat,r.taxon].map(k=>`<span class="tag tag-${k}">${tagLabel[k]}</span>`).join("");
}

function cardMedia(r){
  if(viewMode==="photo"){
    const _p=PLACEHOLDERS[r.filename];
    return `<img src="${_p||('thumbs/'+r.filename)}" ${_p?`data-src="thumbs/${r.filename}"`:''}  alt="${r.alt_text.replace(/"/g,'&quot;')}" style="${_p?'filter:blur(8px);transform:scale(1.05);transition:filter .4s,transform .4s':''}">`;
  }
  return r.svg;
}

function renderCard(r){
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`<div class="card-media">${cardMedia(r)}</div>
    <div class="card-body">
      <div class="card-filename">${r.filename}</div>
      <div class="card-species">${r.species}</div>
      <div class="card-alt">${r.alt_text}</div>
      <div class="card-tags">${makeTags(r)}</div>
    </div>`;
  d.addEventListener("click",()=>openModal(r));
  return d;
}

const grid=document.getElementById("grid");
const countEl=document.getElementById("count");
const searchEl=document.getElementById("search");
const overlay=document.getElementById("overlay");

function matches(r){
  const q=searchEl.value.trim().toLowerCase();
  if(q){
    const blob=[r.species,r.alt_text,r.features,r.context,r.observations,r.filename].join(" ").toLowerCase();
    if(!blob.includes(q))return false;
  }
  for(const f of activeFilters){
    const[type,val]=f.split(":");
    if(type==="time"&&r.time!==val)return false;
    if(type==="hab"&&r.habitat!==val)return false;
    if(type==="tax"&&r.taxon!==val)return false;
  }
  return true;
}

function render(){
  const vis=DATA.filter(matches);
  grid.innerHTML="";
  if(!vis.length){grid.innerHTML='<div class="empty">No records match your filters.</div>';}
  else{vis.forEach(r=>grid.appendChild(renderCard(r)));}
  grid.querySelectorAll('img[data-src]').forEach(img=>_lzObs.observe(img));
  countEl.innerHTML=vis.length===DATA.length
    ?`<em>${DATA.length}</em> records`
    :`<em>${vis.length}</em> of ${DATA.length} records`;
}

document.querySelectorAll(".chip").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const f=btn.dataset.filter;
    const[type]=f.split(":");
    if(btn.classList.contains("active")){
      btn.classList.remove("active");activeFilters.delete(f);
    } else {
      document.querySelectorAll(`.chip[data-filter^="${type}:"]`).forEach(b=>{
        b.classList.remove("active");activeFilters.delete(b.dataset.filter);
      });
      btn.classList.add("active");activeFilters.add(f);
    }
    render();
  });
});
searchEl.addEventListener("input",render);

function updateModalMedia(){
  const div=document.getElementById("modal-media");
  const swap=document.getElementById("modal-swap");
  swap.textContent=modalMode==="photo"?"Show illustration":"Show photo";
  Array.from(div.children).forEach(c=>{if(c!==swap)c.remove();});
  let el;
  if(modalMode==="photo"){
    el=document.createElement("img");
    el.src=cur.filename;
    el.alt=cur.alt_text;
    el.style.cssText="width:100%;height:240px;object-fit:cover;display:block";
  } else {
    el=document.createElement("div");
    el.innerHTML=cur.svg;
    const s=el.querySelector("svg");
    if(s)s.style.cssText="width:100%;height:240px";
  }
  div.insertBefore(el,swap);
}

function swapModal(){
  modalMode=modalMode==="photo"?"illustration":"photo";
  updateModalMedia();
}

function openModal(r){
  cur=r;
  modalMode=viewMode;
  updateModalMedia();
  document.getElementById("modal-title-el").textContent=r.species;
  document.getElementById("modal-file").textContent=r.filename;
  document.getElementById("modal-body").innerHTML=`
    <div class="modal-tags">${makeTags(r)}</div>
    <div class="field"><div class="field-label">Alt-text (WCAG)</div><div class="field-value alt">${r.alt_text}</div></div>
    <div class="field"><div class="field-label">Key visual features</div><div class="field-value">${r.features}</div></div>
    <div class="field"><div class="field-label">Context / setting</div><div class="field-value">${r.context}</div></div>
    <div class="field"><div class="field-label">Observations</div><div class="field-value">${r.observations}</div></div>`;
  overlay.classList.add("open");
  document.getElementById("modal-swap").focus();
}

function closeModal(){overlay.classList.remove("open");}
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

setView(viewMode);
</script>
</body>
</html>
